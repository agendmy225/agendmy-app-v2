name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm install

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permissão ao gradlew
        run: chmod +x android/gradlew

      - name: Aumentar memória do Gradle
        run: echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Criar keystore
        run: |
          keytool -genkey -v -keystore android/app/agendmy.keystore \
            -alias agendmy -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass agendmy123 -keypass agendmy123 \
            -dname "CN=AgendMy, OU=Dev, O=AgendMy, L=Brasil, S=SP, C=BR"

      - name: Limpar build
        run: cd android && ./gradlew clean --no-daemon

      - name: Gerar APK
        run: |
          cd android && ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=app/agendmy.keystore \
            -Pandroid.injected.signing.store.password=agendmy123 \
            -Pandroid.injected.signing.key.alias=agendmy \
            -Pandroid.injected.signing.key.password=agendmy123 \
            -x stripDebugDebugSymbols \
            --no-daemon

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: agendmy-samsung
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7